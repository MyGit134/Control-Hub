version: "3.9"

services:
  hub:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - ./server/.env
    ports:
      - "8080:8080"
    volumes:
      - hub-data:/app/server/data
      - hub-tmp:/app/server/tmp
    restart: unless-stopped

volumes:
  hub-data:
  hub-tmp:

