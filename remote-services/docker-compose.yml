# Remote services bundle (run this on each managed machine)

version: "3.9"

services:
  desktop:
    image: lscr.io/linuxserver/webtop:latest
    container_name: rch-webtop
    profiles: ["desktop-webtop"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    volumes:
      - ./webtop-config:/config
    ports:
      - "3000:3000"
    shm_size: "1gb"
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: rch-mediamtx
    profiles: ["camera"]
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
    restart: unless-stopped

  cam-mic-publisher:
    image: linuxserver/ffmpeg:latest
    container_name: rch-ffmpeg
    profiles: ["camera"]
    depends_on:
      - mediamtx
    privileged: true
    volumes:
      - /dev:/dev
      - ./start-ffmpeg.sh:/start-ffmpeg.sh:ro
    command: sh /start-ffmpeg.sh
    restart: unless-stopped

  novnc:
    image: novnc/novnc:latest
    container_name: rch-novnc
    profiles: ["desktop-real"]
    network_mode: host
    environment:
      - VNC_SERVER=127.0.0.1:5900
      - WEB_PORT=6080
    restart: unless-stopped
